spring.application.name=backend

spring.datasource.url=jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:hikers_way}?useSSL=false&serverTimezone=UTC
spring.datasource.username=${MYSQLUSER:hikers_way_app}
spring.datasource.password=${MYSQLPASSWORD:changeme}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

hikersway.admin-pin=${ADMIN_PIN:1234}
hikersway.allowed-origins=${ALLOWED_ORIGINS:http://localhost:*}

server.port=${PORT:8080}
